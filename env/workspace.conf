#!/usr/bin/env bash
# CR v7 评测工作区 — 路径与 Python 解释器
#
# 用法:
#   source /path/to/cr_eval_release/env/workspace.conf

if [[ -z "${EVAL_WORKSPACE:-}" ]]; then
  _CONF_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
  EVAL_WORKSPACE="$(cd "${_CONF_DIR}/.." && pwd)"
fi
export EVAL_WORKSPACE

export SHARED127="${EVAL_WORKSPACE}"
export SHARED_DIR="${EVAL_WORKSPACE}"
export DATA_V7_CR="${EVAL_WORKSPACE}/data_v7/CR"
export EVAL_DIR="${EVAL_WORKSPACE}/evaluation"
export SAM2_ROOT="${EVAL_WORKSPACE}/sam2"

export EVAL_RUNS_DIR="${EVAL_RUNS_DIR:-${EVAL_WORKSPACE}/eval_runs}"
export QA_OUTPUT_ROOT="${QA_OUTPUT_ROOT:-${EVAL_RUNS_DIR}}"
export HOI_OUTPUT_ROOT="${HOI_OUTPUT_ROOT:-${EVAL_RUNS_DIR}}"

export GROUNDING_DINO_ROOT="${GROUNDING_DINO_ROOT:-${EVAL_WORKSPACE}/third_party/GroundingDINO}"
export DINO_ENV_PY="${DINO_ENV_PY:-python3}"
export SS_ENV_PY="${SS_ENV_PY:-python3}"
export GOOGLE_ENV_PY="${GOOGLE_ENV_PY:-python3}"
export QA_GEMINI_ENV_PY="${QA_GEMINI_ENV_PY:-${GOOGLE_ENV_PY}}"

export ACTIVATE_DINO="${ACTIVATE_DINO:-${EVAL_WORKSPACE}/env/activate_eval.sh}"
export SETUP_DINO="${SETUP_DINO:-${EVAL_WORKSPACE}/env/setup_dino_env.sh}"

export SAM2_CHECKPOINT="${SAM2_CHECKPOINT:-${SAM2_ROOT}/checkpoints/sam2.1_hiera_large.pt}"
export SAM2_MODEL_CONFIG="${SAM2_MODEL_CONFIG:-configs/sam2.1/sam2.1_hiera_l.yaml}"

export RESIZED_ROOT="${EVAL_WORKSPACE}/final_eval_data_edited"
export DINO_DET_ROOT="${EVAL_DIR}"
export SAM2_TRACK_ROOT="${SAM2_ROOT}"

# 用户本地配置（Python 路径、GEMINI_API_KEY、代理等）
if [[ -f "${EVAL_WORKSPACE}/env/local.conf" ]]; then
  # shellcheck source=/dev/null
  source "${EVAL_WORKSPACE}/env/local.conf"
fi

export CR_DEFAULT_PROXY_URL="${CR_DEFAULT_PROXY_URL:-}"

if [[ -n "${GROUNDING_DINO_ROOT}" && -d "${GROUNDING_DINO_ROOT}" ]]; then
  export PYTHONPATH="${GROUNDING_DINO_ROOT}:${EVAL_DIR}:${PYTHONPATH:-}"
else
  export PYTHONPATH="${EVAL_DIR}:${PYTHONPATH:-}"
fi

export CUDA_VISIBLE_DEVICES="${GPU_ID:-${CUDA_VISIBLE_DEVICES:-0}}"
